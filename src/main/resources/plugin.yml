name: KatIPAuth
version: 1.3.0
main: me.kat.iplock.IPLockPlugin
api-version: "1.19"
libraries:
  - com.h2database:h2:2.4.240
commands:
  ipreset:
    description: Reset a player's IP binding
    permission: ipauth.admin
  ipstatus:
    description: View IP bind status
  ipinfo:
    description: View another player's IP info
    permission: ipauth.admin
  ipforce:
    description: Force-remove IP binding
    permission: ipauth.admin
  ipreload:
    description: Reload plugin config
    permission: ipauth.admin
permissions:
  ipauth.admin:
    description: Allows using all KatIPAuth commands
    default: op
